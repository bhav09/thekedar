[project]
name = "thekedar-orchestrator"
version = "0.1.0"
description = "LangGraph orchestrator worker for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "thekedar-message-adapter",
    "thekedar-mcp-policy",
    "langgraph>=0.3",
    "httpx>=0.28",
    "redis>=5.2",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }
thekedar-message-adapter = { workspace = true }
thekedar-mcp-policy = { workspace = true }

[project.scripts]
thekedar-orchestrator = "thekedar_orchestrator.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_orchestrator"]
