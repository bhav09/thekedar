[project]
name = "thekedar-webhook-ingress"
version = "0.1.0"
description = "Fast webhook ingress — verify, enqueue, fast ACK"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }

[project.scripts]
thekedar-webhook-ingress = "thekedar_webhook_ingress.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_webhook_ingress"]
