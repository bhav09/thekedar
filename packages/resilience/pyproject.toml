[project]
name = "thekedar-resilience"
version = "0.1.0"
description = "Retry, circuit breaker, and provider health for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "httpx>=0.28",
    "tenacity>=9.0",
    "redis>=5.2",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_resilience"]
