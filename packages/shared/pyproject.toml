[project]
name = "thekedar-shared"
version = "0.1.0"
description = "Shared schemas, settings, and middleware for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "starlette>=0.41",
    "redis>=5.2",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "google-cloud-pubsub>=2.27",
    "pyjwt>=2.10",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_shared"]
