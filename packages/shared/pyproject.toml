[project]
name = "thekedar-shared"
version = "0.1.0"
description = "Shared schemas, settings, and middleware for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "starlette>=0.41",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_shared"]
