[project]
name = "thekedar-cli"
version = "0.1.0"
description = "Thekedar operator CLI"
requires-python = ">=3.12"
dependencies = [
    "thekedar-mcp-policy",
    "thekedar-shared",
    "httpx>=0.28",
    "typer>=0.15",
    "pyyaml>=6.0",
]

[tool.uv.sources]
thekedar-mcp-policy = { workspace = true }
thekedar-shared = { workspace = true }

[project.scripts]
thekedar = "thekedar_cli.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_cli"]
