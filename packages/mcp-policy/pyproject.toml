[project]
name = "thekedar-mcp-policy"
version = "0.1.0"
description = "MCP tool and shell command policy enforcement for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_mcp_policy"]
