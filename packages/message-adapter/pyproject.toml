[project]
name = "thekedar-message-adapter"
version = "0.1.0"
description = "WhatsApp and Slack webhook adapters for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "pydantic>=2.10",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_message_adapter"]
