[project]
name = "thekedar-dashboard-hub"
version = "0.1.0"
description = "Dashboard Hub API and widget read models"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }

[project.scripts]
thekedar-dashboard-hub = "thekedar_dashboard_hub.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_dashboard_hub"]

[tool.hatch.build.targets.wheel.force-include]
"src/thekedar_dashboard_hub/static" = "thekedar_dashboard_hub/static"
