[project]
name = "thekedar-ide-adapters"
version = "0.1.0"
description = "IDE adapters for Cursor, VS Code, Claude Code, and Antigravity"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
    "thekedar-context",
    "httpx>=0.28",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }
thekedar-context = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_ide_adapters"]
