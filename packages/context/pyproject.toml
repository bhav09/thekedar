[project]
name = "thekedar-context"
version = "0.1.0"
description = "Global codebase context indexing and retrieval for Thekedar"
requires-python = ">=3.12"
dependencies = [
    "thekedar-shared",
]

[tool.uv.sources]
thekedar-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thekedar_context"]
