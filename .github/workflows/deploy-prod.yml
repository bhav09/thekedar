name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA or tag to deploy (must exist in Artifact Registry)"
        required: true

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: thekedar-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/thekedar/webhook-ingress:${{ inputs.image_tag }}"
          gcloud run deploy webhook-ingress \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "$IMAGE" \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --min-instances 1 \
            --set-env-vars "THEKEDAR_ENVIRONMENT=prod,THEKEDAR_SERVICE_NAME=webhook-ingress"
