# Local dev only — mirrors prod topology. Not the deployment target.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thekedar
      POSTGRES_PASSWORD: thekedar
      POSTGRES_DB: thekedar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thekedar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook-ingress:
    build:
      context: .
      dockerfile: infra/docker/webhook-ingress.Dockerfile
    ports:
      - "8080:8080"
    environment:
      THEKEDAR_ENVIRONMENT: local
      THEKEDAR_REDIS_URL: redis://redis:6379/0
      THEKEDAR_DATABASE_URL: postgresql://thekedar:thekedar@postgres:5432/thekedar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
